baseURL = 'https://ruanchenbin3.github.io/blog'
languageCode = 'zh-CN'
title = '乍意清秋'
theme = 'PaperMod'

[params]
  author = '乍意清秋'
  description = '记录生活、思考与技术'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false
  
  # 外观优化
  defaultTheme = "auto"  # 自动切换暗黑/亮色模式
  disableThemeToggle = false
  
  # 首页配置
  [params.profileMode]
    enabled = true
    title = "乍意清秋"
    subtitle = "记录生活、思考与技术"
    imageUrl = ""
    imageWidth = 120
    imageHeight = 120
    imageTitle = ""
    
  # 首页按钮
  [[params.profileMode.buttons]]
    name = "文章"
    url = "/posts/"
  [[params.profileMode.buttons]]
    name = "关于"
    url = "/about/"

  # 搜索功能
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/ruanchenbin3"

[[params.socialIcons]]
  name = "email"
  url = "mailto:ruanchenbin3@gmail.com"

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '首页'
    url = '/'
    weight = 10
  [[menu.main]]
    identifier = 'search'
    name = '搜索'
    url = '/search/'
    weight = 20

[markup.goldmark.renderer]
  unsafe = true

[params.assets]
  disableHLJS = true
  favicon = "/favicon.ico"
  favicon16x16 = "/favicon-16x16.png"
  favicon32x32 = "/favicon-32x32.png"
  apple_touch_icon = "/apple-touch-icon.png"
  safari_pinned_tab = "/safari-pinned-tab.svg"

[params.homeInfoParams]
  Title = "乍意清秋"
  Content = "记录生活、思考与技术"

[outputs]
  home = ["HTML", "RSS", "JSON"]
